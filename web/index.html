<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Briefing Archive</title>
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #1f2937;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --radius: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.idx-container {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 16px;
}
.idx-header {
  text-align: center;
  background: linear-gradient(135deg, #1e3a5f 0%, #1a73e8 50%, #3b82f6 100%);
  color: white;
  border-radius: var(--radius);
  padding: 36px 24px 32px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-md);
}
.idx-logo {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.idx-today {
  margin-top: 8px;
  font-size: 0.88rem;
  color: rgba(255,255,255,0.8);
}
.idx-search {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
}
.idx-search-label {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.idx-search-right {
  display: flex;
  gap: 8px;
  align-items: center;
}
.idx-cal-btn {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  font-size: 1.1rem;
  cursor: pointer;
  transition: background 0.15s;
  line-height: 1;
}
.idx-cal-btn:hover { background: #f3f4f6; }
.idx-date-hidden {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
  pointer-events: none;
}
.idx-selected {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
}
.idx-search-clear {
  padding: 7px 14px;
  border: none;
  border-radius: 8px;
  background: #f3f4f6;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.idx-search-clear:hover { background: #e5e7eb; }
.idx-no-result {
  text-align: center;
  color: var(--text-secondary);
  padding: 32px 16px;
  font-size: 0.9rem;
}
.idx-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.idx-card {
  display: block;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  text-decoration: none;
  color: var(--text);
  border-left: 3px solid var(--card-accent, #1a73e8);
  transition: box-shadow var(--transition), transform var(--transition);
}
.idx-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.idx-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.idx-date {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
}
.idx-theme {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.idx-meta {
  margin-left: auto;
  font-size: 0.72rem;
  color: var(--text-secondary);
  white-space: nowrap;
}
.idx-headline {
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 4px;
}
.idx-sk {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.idx-sk-tag {
  display: inline-block;
  background: #fff7ed;
  color: #ea580c;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
  flex-shrink: 0;
}
.idx-footer {
  text-align: center;
  padding: 28px 0 8px;
  color: var(--text-secondary);
  font-size: 0.75rem;
}
.idx-empty {
  text-align: center;
  color: var(--text-secondary);
  font-style: italic;
  padding: 40px 16px;
}
@media (max-width: 480px) {
  .idx-container { padding: 16px 12px; }
  .idx-card { padding: 14px 16px; }
  .idx-header { padding: 28px 16px 24px; }
  .idx-logo { font-size: 1.35rem; }
}
</style>
</head>
<body>
<div class="idx-container">
  <header class="idx-header">
    <h1 class="idx-logo">Executive Briefing</h1>
    <p class="idx-today" id="today-date"></p>
  </header>
  <div class="idx-search">
    <span class="idx-search-label">날짜로 검색</span>
    <div class="idx-search-right">
      <button class="idx-cal-btn" id="cal-btn" onclick="openPicker()">📅</button>
      <input type="date" id="date-filter" class="idx-date-hidden">
      <span class="idx-selected" id="selected-date"></span>
      <button class="idx-search-clear" id="clear-filter" style="display:none" onclick="clearFilter()">초기화</button>
    </div>
  </div>
  <main class="idx-grid" id="card-grid">
    <a href="2026-02-23.html" class="idx-card" style="--card-accent: #38bdf8">
      <div class="idx-card-top">
        <span class="idx-date">2026-02-23</span>
        <span class="idx-theme" style="background: #38bdf820; color: #38bdf8">Data Pulse</span>
        <span class="idx-meta">39건</span>
      </div>
      <div class="idx-headline">SK스퀘어, 美 해머스페이스 포함 AI·반도체 기업 누적투자 300억원</div>
      
    </a>
    <a href="2026-02-22.html" class="idx-card" style="--card-accent: #dc2626">
      <div class="idx-card-top">
        <span class="idx-date">2026-02-22</span>
        <span class="idx-theme" style="background: #dc262620; color: #dc2626">Risk Alert</span>
        <span class="idx-meta">37건</span>
      </div>
      <div class="idx-headline">SK에코플랜트 IPO 재무적 투자자 협상 중심 전환</div>
      <div class="idx-sk"><span class="idx-sk-tag">SK에코</span> IPO 전략 전환, 재무적 투자자와 협상 중</div>
    </a>
  </main>
  <p class="idx-no-result" id="no-result" style="display:none">해당 날짜의 브리핑이 없습니다.</p>
  <footer class="idx-footer">
    <p>News Agent — Executive Briefing Archive</p>
  </footer>
</div>
<script>
var dateInput = document.getElementById('date-filter');
var clearBtn = document.getElementById('clear-filter');
var noResult = document.getElementById('no-result');
var cards = document.querySelectorAll('.idx-card');

(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth()+1).padStart(2,'0');
  var d = String(now.getDate()).padStart(2,'0');
  document.getElementById('today-date').textContent = y+'-'+m+'-'+d;
})();

function openPicker() {
  dateInput.showPicker();
}

function filterCards() {
  var val = dateInput.value;
  document.getElementById('selected-date').textContent = val || '';
  clearBtn.style.display = val ? 'inline-block' : 'none';
  var shown = 0;
  cards.forEach(function(card) {
    var cardDate = card.querySelector('.idx-date').textContent.trim();
    if (!val || cardDate === val) {
      card.style.display = '';
      shown++;
    } else {
      card.style.display = 'none';
    }
  });
  noResult.style.display = shown === 0 ? 'block' : 'none';
}
dateInput.addEventListener('input', filterCards);
dateInput.addEventListener('change', filterCards);

function clearFilter() {
  dateInput.value = '';
  document.getElementById('selected-date').textContent = '';
  clearBtn.style.display = 'none';
  noResult.style.display = 'none';
  cards.forEach(function(card) { card.style.display = ''; });
}
</script>
</body>
</html>
